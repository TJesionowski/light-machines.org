<!doctype html><html><head><meta charset="utf-8"><title>Dark mode</title><link rel="stylesheet" href="card.css"></head>
<body><div class="card" style="background:#14130F;color:#ECE7DC">
  <div class="row" style="gap:10px">
    <div class="swatch"><div class="chip" style="background:#14130F;box-shadow:inset 0 0 0 1px rgba(236,231,220,0.14)"></div><div class="name" style="color:#ECE7DC">Paper</div><div class="hex" style="color:#8B867A">#14130F</div></div>
    <div class="swatch"><div class="chip" style="background:#1C1B17;box-shadow:inset 0 0 0 1px rgba(236,231,220,0.14)"></div><div class="name" style="color:#ECE7DC">Paper 2</div><div class="hex" style="color:#8B867A">#1C1B17</div></div>
    <div class="swatch"><div class="chip" style="background:#262420;box-shadow:inset 0 0 0 1px rgba(236,231,220,0.14)"></div><div class="name" style="color:#ECE7DC">Paper 3</div><div class="hex" style="color:#8B867A">#262420</div></div>
    <div class="swatch"><div class="chip" style="background:#ECE7DC"></div><div class="name" style="color:#ECE7DC">Ink</div><div class="hex" style="color:#8B867A">#ECE7DC</div></div>
    <div class="swatch"><div class="chip" style="background:#8FA4FF"></div><div class="name" style="color:#ECE7DC">LED</div><div class="hex" style="color:#8B867A">#8FA4FF</div></div>
    <div class="swatch"><div class="chip" style="background:#C99060"></div><div class="name" style="color:#ECE7DC">Amber</div><div class="hex" style="color:#8B867A">#C99060</div></div>
  </div>
  <div style="margin-top:18px;font-family:'EB Garamond',serif;font-size:17px;line-height:1.55;color:#ECE7DC">
    The lampstand still bears the same light, just at night. <span style="color:#8FA4FF;border-bottom:1px solid #8FA4FF">A link still glows</span>, and a <sup style="color:#C99060;font-weight:700;font-family:'Inria Sans',sans-serif;font-size:10px">7</sup> sidenote marker rests beneath the ink rather than competing with it.
  </div>
</div></body></html>
