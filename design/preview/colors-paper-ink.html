<!doctype html><html><head><meta charset="utf-8"><title>Paper & Ink</title><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="row" style="gap:12px">
    <div class="swatch"><div class="chip" style="background:#FAF8F3"></div><div class="name">Paper</div><div class="hex">#FAF8F3 · --paper</div></div>
    <div class="swatch"><div class="chip" style="background:#F2EEE5"></div><div class="name">Paper 2</div><div class="hex">#F2EEE5 · --paper-2</div></div>
    <div class="swatch"><div class="chip" style="background:#E8E2D4"></div><div class="name">Paper 3</div><div class="hex">#E8E2D4 · --paper-3</div></div>
    <div class="swatch"><div class="chip" style="background:#1A1A1A"></div><div class="name">Ink</div><div class="hex">#1A1A1A · --ink</div></div>
    <div class="swatch"><div class="chip" style="background:#3D3A36"></div><div class="name">Ink 2</div><div class="hex">#3D3A36 · --ink-2</div></div>
    <div class="swatch"><div class="chip" style="background:#6B665E"></div><div class="name">Ink 3</div><div class="hex">#6B665E · --ink-3</div></div>
    <div class="swatch"><div class="chip" style="background:#A39E94"></div><div class="name">Ink 4</div><div class="hex">#A39E94 · --ink-4</div></div>
  </div>
</div></body></html>
