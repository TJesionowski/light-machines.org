<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="card.css">
<style>
  /* Italic-on-hover for buttons. Inria Sans has a true italic, so the
     transition is purely typographic — no skew, no layout shift, no scale.
     We pre-reserve the italic width by setting the same italic glyphs
     in a hidden ::after pseudo, so the button doesn't reflow on hover. */
  .lm-btn {
    font-family: 'Inria Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    border: 0; cursor: pointer;
    padding: 10px 18px;
    border-radius: 4px;
    letter-spacing: .005em;
    transition: font-style 220ms cubic-bezier(.2,.7,.2,1),
                background 160ms cubic-bezier(.2,.7,.2,1),
                color 160ms cubic-bezier(.2,.7,.2,1);
    font-style: normal;
  }
  .lm-btn:hover { font-style: italic; }
  .lm-btn:active { transform: translateY(1px); }

  .lm-btn-primary { background:#1A1A1A; color:#FAF8F3; }
  .lm-btn-primary:hover { background:#2D2D2D; }

  .lm-btn-secondary {
    background: transparent; color:#1A1A1A;
    border: 1px solid #1A1A1A;
    padding: 9px 17px;
  }
  .lm-btn-secondary:hover { background:#F2EEE5; }

  .lm-btn-text {
    background: transparent; color:#0A1F8F;
    border: 0; border-bottom: 1px solid #0A1F8F;
    border-radius: 0;
    padding: 6px 4px; font-weight: 500;
  }
  .lm-btn-text:hover { color:#2541D9; border-bottom-color:#2541D9; background: transparent; }

  .lm-btn-subtle {
    background:#F2EEE5; color:#1A1A1A;
    font-size: 13px; padding: 7px 12px;
  }
  .lm-btn-subtle:hover { background:#E8E2D4; }

  /* Pre-reserve italic width so the row doesn't reflow on hover.
     Each button stamps its own italic ghost via a data attribute. */
  .lm-btn { position: relative; }
  .lm-btn::after {
    content: attr(data-label);
    font-style: italic;
    visibility: hidden;
    height: 0;
    display: block;
    overflow: hidden;
    pointer-events: none;
  }
</style>
</head>
<body><div class="card">
  <div class="label">Buttons — verbs of what happens next · italic on hover</div>
  <div style="display:flex;gap:14px;margin-top:14px;align-items:center;flex-wrap:wrap">
    <button class="lm-btn lm-btn-primary"   data-label="Read the essay">Read the essay</button>
    <button class="lm-btn lm-btn-secondary" data-label="Notes &amp; sources">Notes &amp; sources</button>
    <button class="lm-btn lm-btn-text"      data-label="Continue reading ↗">Continue reading ↗</button>
    <button class="lm-btn lm-btn-subtle"    data-label="Cite">Cite</button>
  </div>
  <div class="mono" style="margin-top:14px">primary · secondary · text · subtle &nbsp;→&nbsp; hover italicizes (220ms, ease-out); width pre-reserved to prevent reflow; press translates 1px down, no scale</div>
</div></body></html>
