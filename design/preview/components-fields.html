<!doctype html><html><head><meta charset="utf-8"><title>Form fields</title><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">Form fields — hairline rules, no rounded chips</div>
  <div style="display:flex;flex-direction:column;gap:14px;margin-top:14px;max-width:420px">
    <label style="display:flex;flex-direction:column;gap:4px">
      <span style="font-family:'Inria Sans',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#6B665E;font-weight:700">Search</span>
      <input value="legibility" style="font-family:'EB Garamond',serif;font-size:16px;padding:8px 0;background:transparent;border:0;border-bottom:1px solid rgba(26,26,26,0.28);color:#1A1A1A;outline:none">
    </label>
    <label style="display:flex;flex-direction:column;gap:4px">
      <span style="font-family:'Inria Sans',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#6B665E;font-weight:700">Email — for occasional dispatches</span>
      <input placeholder="you@…" style="font-family:'Inria Sans',sans-serif;font-size:14px;padding:9px 12px;background:#FAF8F3;border:1px solid rgba(26,26,26,0.28);border-radius:4px;color:#1A1A1A;outline:none">
    </label>
    <div style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" checked style="accent-color:#0A1F8F;width:14px;height:14px">
      <span style="font-family:'Inria Sans',sans-serif;font-size:13px;color:#3D3A36">Notify me when this essay is revised</span>
    </div>
  </div>
</div></body></html>
