<!doctype html><html><head><meta charset="utf-8"><title>Layout & rhythm</title><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">Measure 38rem (~65ch) · sidenote column 14rem · centered, left-aligned</div>
  <div style="margin-top:14px;display:flex;gap:14px;justify-content:center;align-items:flex-start">
    <div style="width:380px;background:#F2EEE5;padding:14px 18px;font-family:'EB Garamond',serif;font-size:14px;line-height:1.55;color:#3D3A36">
      <div style="font-family:'EB Garamond',serif;font-size:22px;line-height:1.1;color:#1A1A1A;margin-bottom:8px">Body measure</div>
      The text column is capped at roughly sixty-five characters of body Garamond. Hyphens are on. Lines are left-aligned, never justified.<sup style="color:#B8732A;font-weight:700;font-family:'Inria Sans',sans-serif;font-size:9px">1</sup>
    </div>
    <div style="width:160px;border-left:1px solid rgba(26,26,26,0.12);padding-left:12px">
      <div style="font-family:'Inria Sans',sans-serif;font-size:11px;color:#6B665E;line-height:1.5">
        <span style="color:#B8732A;font-weight:700;font-size:9px;vertical-align:super">1</span>&nbsp;Sidenotes appear here on desktop ≥ 1024px; collapse to inline footnotes below.
      </div>
    </div>
  </div>
</div></body></html>
