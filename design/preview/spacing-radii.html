<!doctype html><html><head><meta charset="utf-8"><title>Radii & elevation</title><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="label">Radii — prose stays square; controls take a small radius</div>
  <div style="display:flex;gap:18px;margin-top:14px;align-items:flex-end">
    <div style="text-align:center"><div style="width:80px;height:48px;background:#F2EEE5;box-shadow:inset 0 0 0 1px rgba(26,26,26,0.12)"></div><div class="mono" style="margin-top:6px">r-0 · 0</div></div>
    <div style="text-align:center"><div style="width:80px;height:48px;background:#F2EEE5;border-radius:2px;box-shadow:inset 0 0 0 1px rgba(26,26,26,0.12)"></div><div class="mono" style="margin-top:6px">r-1 · 2</div></div>
    <div style="text-align:center"><div style="width:80px;height:48px;background:#F2EEE5;border-radius:4px;box-shadow:inset 0 0 0 1px rgba(26,26,26,0.12)"></div><div class="mono" style="margin-top:6px">r-2 · 4</div></div>
    <div style="text-align:center"><div style="width:80px;height:48px;background:#F2EEE5;border-radius:8px;box-shadow:inset 0 0 0 1px rgba(26,26,26,0.12)"></div><div class="mono" style="margin-top:6px">r-3 · 8</div></div>
  </div>
  <div class="label" style="margin-top:22px">Elevation — one shadow; reserved for popups</div>
  <div style="display:flex;gap:18px;margin-top:14px;align-items:flex-end">
    <div style="text-align:center"><div style="width:120px;height:48px;background:#FAF8F3;box-shadow:0 0 0 1px rgba(26,26,26,0.12)"></div><div class="mono" style="margin-top:6px">hairline</div></div>
    <div style="text-align:center"><div style="width:120px;height:48px;background:#FAF8F3;border-radius:4px;box-shadow:0 1px 2px rgba(26,26,26,0.06),0 8px 24px rgba(26,26,26,0.10)"></div><div class="mono" style="margin-top:6px">popup</div></div>
  </div>
</div></body></html>
